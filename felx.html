<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Flex</title>
    <style>
        .felx_item{
            height:200px;
            width:200px;
            font-size:50px;
            color:rgb(246, 243, 243);
            background-color: blueviolet;
            padding: 40px;
            margin: 20px;
            border-radius: 30px;
            display:flex;
            justify-content: center;
            align-items: center;

        }
        .felx_hall{
            display:flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content:space-between; 
           /* justify-content: center; */
          
        }

    </style>

</head>
<body>
    <!-- Short cut for print list with class -  ul.classname>li.classname -->
    <ul class="felx_hall">
        <li class="felx_item">1</li>
        <li class="felx_item">2</li>
        <li class="felx_item">3</li>
        <li class="felx_item">4</li>
        <li class="felx_item">5</li>
        <li class="felx_item">6</li>
        <li class="felx_item">7</li>
        <li class="felx_item">8</li>
        <li class="felx_item">9</li>
        <li class="felx_item">10</li>
    </ul>
</body>
</html>
