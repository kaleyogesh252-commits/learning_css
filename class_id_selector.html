<!DOCTYPE html>
<html lang="en">
    <head>

        <title>Document</title>
        <style>
        .heading1{
            color: brown;
        }
        .heading2{
            color: brown;
        }
        #heading3{
            color: aqua;
        }
         #heading4{
            color: aqua;
        }
        .heading7{
            color: black;
        }
         #heading6{
            color: rgb(65, 7, 199);
        }
      /* class */
    .heading_f_size{
        font-size: 40;
    }
    .h_color1{
        color:chartreuse;
        
    }
    .h_color2{
        color: blue;
    }
    .h_color3{
        color: blueviolet;
    }
    .h_bgcolor1{
        background-color: aqua;

    }
      .h_bgcolor2{
        background-color: aqua;

    }

    </style>
    </head>
    <body>
        <!-- class selector example -->
        <h1 class="heading1">Hello Good Morning</h1>
        <h1 class="heading2">Hello Good Morning</h1>
        <!-- id selector example -->
        <h1 id="heading3">hello good night</h1>
        <h1 id="heading4">hello good night</h1>
        <!-- difference between id and class -->
        <h1 id="heading6" class="heading7"> Wellcome To pune</h1>

        <!-- class  -->
        <h1 class="heading_f_size h_color1 h_bgcolor1 ">Pratibha Collage Of
            Commerce And Computer Studies </h1>
        <h1 class="heading_f_size h_color2 h_bgcolor2 ">Pratibha Collage Of
            Commerce And Computer Studies </h1>
        <h1 class="heading_f_size h_color3 h_bgcolor3 ">Pratibha Collage Of
            Commerce And Computer Studies </h1>

    </body>
</html>
