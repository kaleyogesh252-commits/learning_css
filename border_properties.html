<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Border Properties </title>
    <style>
        /* solid  dotted dashed double inset outset */
        .Border_proprities{
            border: 15px double black;
            border-left-color: blue;     /*Left Sider la Border color Dhakhavnar */
         border-right-color: blueviolet;      /*  Right sider la Border color Dhakhavnar  */
        }
        .br_proprities{
            border-radius:30%;
            
        }
    </style>
</head>
<body>
    <img class="Border_proprities"   src="images/Nature.jpg" alt="Nature"/>
    
    <hr>

    <img class="Border_proprities" src="images/Butterfullly.jpg" alt="butterfully img"/>
    
    <hr>

    <img class="br_proprities" src="images/par.jpg"/>

</body>

</html>
