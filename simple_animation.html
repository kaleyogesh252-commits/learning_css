<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Animation</title>
   <style>
    div{
    width: 200px;
    height: 200px;
    background-color: blueviolet;
    position: relative;
    border-radius: 20px;
    animation: movebox;
    animation-duration: 2s;
    animation-iteration-count: infinite; 
    animation-delay: 5s;
    animation-direction:reverse;

}
@keyframes movebox{
    0%{background-color: blueviolet;left:0px;top:0px}
    25%{background-color: brown;left:300px;top:0px}
    50%{background-color: pink;left:300px;top:300px}
    75%{background-color: black;left:0px;top:300px}
    100%{background-color: aqua;left:0px;top:0px}
}
   </style>
</head>
<body>
    <div> </div>
</body>
</html>
