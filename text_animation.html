<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>document</title>
        <style>
        .text-container{
            display: flex;
            font-size:  80px;
            font-weight: 700;
            letter-spacing: 4px;
           justify-content: center;
           align-items: center;
           perspective: 60px;
             }
        b {
           
            height: 100px;
            box-shadow: 0px 5px 4px rgb(90, 10, 251);
            background-color: rgb(180, 12, 40);
            color: transparent;
            background-clip: text;
            transform-origin: bottom;
            animation:getUpDown 2s infinite;

        } 
        .text-container > b:nth-child(1){
            animation-delay:0s;
        }
         .text-container > b:nth-child(2){
            animation-delay:0.25s;
        }
         .text-container > b:nth-child(3){
            animation-delay:0.79s;
        }
         .text-container > b:nth-child(4){
            animation-delay:0s;
        }
         .text-container > b:nth-child(5){
            animation-delay:1s;
        }
         .text-container > b:nth-child(6){
            animation-delay:1s;
        }
@keyframes getUpDown{
    from{transform:rotate(-85deg);}
    10%,50%{transform:rotateX(0);}
    60%,to{transform:rotate(-85deg);}
}
    </style>
    </head>
    <body>
        <div class="text-container">
             <b>Y</b> <b>O</b> <b>G</b> <b>E</b> <b>S</b> <b>H</b>
        </div>
       
    </body>
</html>
